
[tool.pyright]
include = [
	"."
]
exclude = [
	".venv",
	".vscode",
	".zed",
	"packages",
	"stf_blender_module_template",
	"**/__pycache__",
	"**/node_modules",
	"**/.*"
]
ignore = [
	"stfblender/common/interface_stf_*.py",
	"auto_load.py"
]
defineConstant = { DEBUG = true }
pythonVersion = "3.13"

useLibraryCodeForTypes = true
typeCheckingMode = "standard"
reportInvalidTypeForm = "none"
reportAttributeAccessIssue = "information"
reportOptionalMemberAccess = "information"


[tool.ruff]
ignore = [
	"E701",
]
[tool.ruff.format]
quote-style = "double"
indent-style = "tab"
